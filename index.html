<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Wiz</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wiz">
<meta name="theme-color" content="#0a0c0f">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: #0a0c0f;
  color: #e8eaf0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  min-height: 100vh;
  padding: 16px;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.logo {
  font-size: 24px;
  font-weight: 700;
  color: #00e5b0;
  letter-spacing: 3px;
}
.btn {
  background: #00e5b0;
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  -webkit-appearance: none;
}
.btn:active { opacity: 0.7; }
.btn-secondary {
  background: #161a22;
  color: #00e5b0;
  border: 1px solid #00e5b0;
}
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.tab {
  padding: 8px 14px;
  background: #161a22;
  color: #5a6278;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  border: none;
}
.tab.active { background: #00e5b0; color: #000; }
.summary {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.card {
  background: #111318;
  border: 1px solid #1e2330;
  border-radius: 10px;
  padding: 12px;
}
.card-label {
  font-size: 11px;
  color: #5a6278;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.card-value {
  font-size: 18px;
  font-weight: 600;
  font-family: ui-monospace, monospace;
}
.pos { color: #10b981; }
.neg { color: #ef4444; }
.neu { color: #e8eaf0; }
.strategy {
  background: #111318;
  border: 1px solid #1e2330;
  border-radius: 10px;
  margin-bottom: 10px;
  padding: 14px;
}
.strategy-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.strategy-name {
  font-size: 15px;
  font-weight: 600;
}
.strategy-color-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 8px;
  vertical-align: middle;
}
.strategy-metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 8px;
}
.metric {
  background: #161a22;
  padding: 8px;
  border-radius: 6px;
}
.metric-label {
  font-size: 10px;
  color: #5a6278;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 3px;
}
.metric-value {
  font-size: 13px;
  font-weight: 600;
  font-family: ui-monospace, monospace;
}
.metric-target {
  font-size: 10px;
  color: #5a6278;
  margin-top: 2px;
}
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #111318;
  border-radius: 16px 16px 0 0;
  width: 100%;
  max-width: 600px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 20px;
}
.modal-title {
  font-size: 18px;
  font-weight: 700;
  color: #00e5b0;
  margin-bottom: 16px;
  letter-spacing: 1px;
}
.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 11px;
  color: #5a6278;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 5px;
}
.field input, .field select {
  width: 100%;
  background: #161a22;
  border: 1px solid #1e2330;
  border-radius: 8px;
  padding: 12px;
  color: #e8eaf0;
  font-size: 16px;
  font-family: inherit;
  -webkit-appearance: none;
}
.field input:focus, .field select:focus {
  outline: none;
  border-color: #00e5b0;
}
.btn-full {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  margin-top: 8px;
}
.btn-close {
  background: #161a22;
  color: #e8eaf0;
  margin-bottom: 12px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  font-family: ui-monospace, monospace;
}
th, td {
  text-align: left;
  padding: 8px 10px;
  border-bottom: 1px solid #1e2330;
  white-space: nowrap;
}
th {
  font-size: 10px;
  color: #5a6278;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: #161a22;
}
.table-wrap { overflow-x: auto; }
.tip {
  background: rgba(0,229,176,0.06);
  border: 1px solid rgba(0,229,176,0.2);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 12px;
  color: #00e5b0;
  margin-bottom: 12px;
}
.empty {
  text-align: center;
  padding: 40px 20px;
  color: #5a6278;
  font-size: 13px;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">WIZ</div>
  <button class="btn" onclick="openLog()">+ LOG P&amp;L</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('dash', this)">Dashboard</button>
  <button class="tab" onclick="showTab('history', this)">History</button>
  <button class="tab" onclick="showTab('export', this)">Export</button>
</div>

<div id="tab-dash">
  <div class="summary">
    <div class="card">
      <div class="card-label">Total AUM</div>
      <div class="card-value neu" id="totalAUM">$0</div>
    </div>
    <div class="card">
      <div class="card-label">Total P&amp;L</div>
      <div class="card-value neu" id="totalPnl">$0</div>
    </div>
  </div>
  <div id="strategies"></div>
</div>

<div id="tab-history" style="display:none;">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Strategy</th>
          <th>Prev AUM</th>
          <th>New AUM</th>
          <th>P&amp;L</th>
          <th>%</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody id="historyBody"></tbody>
    </table>
  </div>
</div>

<div id="tab-export" style="display:none;">
  <div class="tip">
    Tap below to download all your data as a CSV file. Opens in Numbers (Apple), Excel, or Google Sheets.
  </div>
  <button class="btn btn-full" onclick="exportCSV()">Download CSV</button>
  <div style="margin-top:24px;">
    <div class="card-label">Reset all data</div>
    <button class="btn btn-full" style="background:#ef4444;color:#fff;margin-top:8px;" onclick="resetData()">Clear all entries</button>
  </div>
</div>

<div class="modal-overlay" id="logModal" onclick="if(event.target===this)closeLog()">
  <div class="modal">
    <div class="modal-title">LOG P&amp;L ENTRY</div>
    <div class="field">
      <label>Strategy</label>
      <select id="fStrat">
        <option value="hedge">Hedge Fund</option>
        <option value="macro">Macro Trading (IG)</option>
        <option value="futures">Equity Futures (IBKR)</option>
        <option value="equity">Long-Term Equity</option>
      </select>
    </div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="fDate">
    </div>
    <div class="field">
      <label>Current AUM ($)</label>
      <input type="number" id="fAUM" placeholder="e.g. 5000000" inputmode="decimal">
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <input type="text" id="fNotes" placeholder="Key positions, themes...">
    </div>
    <button class="btn btn-full" onclick="saveEntry()">SAVE</button>
    <button class="btn btn-close btn-full" onclick="closeLog()">Cancel</button>
  </div>
</div>

<script>
var STRATS = {
  hedge:   { name: 'Hedge Fund',       color: '#00e5b0', target: { weekly: 1.0,  monthly: 4.0,  annual: 52  } },
  macro:   { name: 'Macro Trading',    color: '#3b6bff', target: { weekly: 10.0, monthly: 50.0, annual: 600 } },
  futures: { name: 'Equity Futures',   color: '#f59e0b', target: { weekly: 5.0,  monthly: 20.0, annual: 240 } },
  equity:  { name: 'Long-Term Equity', color: '#a855f7', target: { weekly: 1.0,  monthly: 4.0,  annual: 48  } }
};

var entries = [];
try {
  entries = JSON.parse(localStorage.getItem('wiz_entries') || '[]');
} catch(e) { entries = []; }

function save() {
  try { localStorage.setItem('wiz_entries', JSON.stringify(entries)); } catch(e) {}
}

function fmtMoney(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  var abs = Math.abs(n);
  var sign = n < 0 ? '-' : '';
  var str;
  if (abs >= 1e6) str = (abs/1e6).toFixed(2) + 'M';
  else if (abs >= 1e3) str = (abs/1e3).toFixed(1) + 'K';
  else str = abs.toFixed(0);
  return sign + '$' + str;
}

function fmtPct(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}

function colorClass(n) {
  if (n > 0) return 'pos';
  if (n < 0) return 'neg';
  return 'neu';
}

function todayStr() {
  var d = new Date();
  var m = (d.getMonth()+1).toString();
  if (m.length < 2) m = '0' + m;
  var day = d.getDate().toString();
  if (day.length < 2) day = '0' + day;
  return d.getFullYear() + '-' + m + '-' + day;
}

function weekStart(dateStr) {
  var d = new Date(dateStr);
  var day = d.getDay();
  var diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d.toISOString().split('T')[0];
}

function monthStart(dateStr) { return dateStr.slice(0,7) + '-01'; }
function yearStart(dateStr) { return dateStr.slice(0,4) + '-01-01'; }

function getEntries(stratId) {
  var arr = [];
  for (var i = 0; i < entries.length; i++) {
    if (entries[i].strategy === stratId) arr.push(entries[i]);
  }
  arr.sort(function(a, b) { return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });
  return arr;
}

function periodReturn(stratId, fromDate, toDate) {
  var arr = getEntries(stratId);
  var inPeriod = [];
  for (var i = 0; i < arr.length; i++) {
    if (arr[i].date >= fromDate && arr[i].date <= toDate) inPeriod.push(arr[i]);
  }
  if (inPeriod.length === 0) return null;
  var cum = 1;
  for (var j = 0; j < inPeriod.length; j++) {
    cum *= (1 + inPeriod[j].pct / 100);
  }
  return (cum - 1) * 100;
}

function getMetrics(stratId) {
  var arr = getEntries(stratId);
  if (arr.length === 0) return null;
  var latest = arr[arr.length - 1];
  var first = arr[0];
  var today = latest.date;
  return {
    currAUM: latest.aum,
    firstAUM: first.aum,
    totalPnL: latest.aum - first.aum,
    wtd: periodReturn(stratId, weekStart(today), today),
    mtd: periodReturn(stratId, monthStart(today), today),
    ytd: periodReturn(stratId, yearStart(today), today),
    itd: periodReturn(stratId, first.date, today)
  };
}

function renderDashboard() {
  var container = document.getElementById('strategies');
  var html = '';
  var totalAUM = 0, totalPnL = 0;
  for (var id in STRATS) {
    var s = STRATS[id];
    var m = getMetrics(id);
    if (m) {
      totalAUM += m.currAUM;
      totalPnL += m.totalPnL;
    }
    var aum = m ? fmtMoney(m.currAUM) : '—';
    var pnl = m ? fmtMoney(m.totalPnL) : '—';
    var pnlClass = m ? colorClass(m.totalPnL) : 'neu';
    var wtd = m && m.wtd !== null ? fmtPct(m.wtd) : '—';
    var mtd = m && m.mtd !== null ? fmtPct(m.mtd) : '—';
    var ytd = m && m.ytd !== null ? fmtPct(m.ytd) : '—';
    var itd = m && m.itd !== null ? fmtPct(m.itd) : '—';
    var wtdC = m && m.wtd !== null ? colorClass(m.wtd) : 'neu';
    var mtdC = m && m.mtd !== null ? colorClass(m.mtd) : 'neu';
    var ytdC = m && m.ytd !== null ? colorClass(m.ytd) : 'neu';
    var itdC = m && m.itd !== null ? colorClass(m.itd) : 'neu';
    html += '<div class="strategy">' +
      '<div class="strategy-header">' +
        '<div><span class="strategy-color-dot" style="background:' + s.color + '"></span><span class="strategy-name">' + s.name + '</span></div>' +
        '<div style="text-align:right;">' +
          '<div class="card-value ' + pnlClass + '" style="font-size:14px;">' + pnl + '</div>' +
          '<div style="font-size:11px;color:#5a6278;">AUM: ' + aum + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="strategy-metrics">' +
        '<div class="metric"><div class="metric-label">WTD</div><div class="metric-value ' + wtdC + '">' + wtd + '</div><div class="metric-target">tgt ' + fmtPct(s.target.weekly) + '</div></div>' +
        '<div class="metric"><div class="metric-label">MTD</div><div class="metric-value ' + mtdC + '">' + mtd + '</div><div class="metric-target">tgt ' + fmtPct(s.target.monthly) + '</div></div>' +
        '<div class="metric"><div class="metric-label">YTD</div><div class="metric-value ' + ytdC + '">' + ytd + '</div><div class="metric-target">tgt ' + fmtPct(s.target.annual) + '</div></div>' +
        '<div class="metric"><div class="metric-label">ITD</div><div class="metric-value ' + itdC + '">' + itd + '</div><div class="metric-target">inception</div></div>' +
      '</div>' +
    '</div>';
  }
  container.innerHTML = html;
  document.getElementById('totalAUM').textContent = totalAUM > 0 ? fmtMoney(totalAUM) : '—';
  document.getElementById('totalAUM').className = 'card-value neu';
  document.getElementById('totalPnl').textContent = entries.length > 0 ? fmtMoney(totalPnL) : '—';
  document.getElementById('totalPnl').className = 'card-value ' + colorClass(totalPnL);
}

function renderHistory() {
  var body = document.getElementById('historyBody');
  if (entries.length === 0) {
    body.innerHTML = '<tr><td colspan="7" class="empty">No entries yet. Tap + LOG P&amp;L to add one.</td></tr>';
    return;
  }
  var sorted = entries.slice().sort(function(a, b) { return a.date < b.date ? 1 : -1; });
  var html = '';
  for (var i = 0; i < sorted.length; i++) {
    var e = sorted[i];
    var s = STRATS[e.strategy];
    html += '<tr>' +
      '<td style="color:#5a6278;">' + e.date + '</td>' +
      '<td><span style="color:' + s.color + ';font-weight:600;">' + s.name + '</span></td>' +
      '<td>' + fmtMoney(e.prevAUM) + '</td>' +
      '<td>' + fmtMoney(e.aum) + '</td>' +
      '<td class="' + colorClass(e.pnl) + '">' + fmtMoney(e.pnl) + '</td>' +
      '<td class="' + colorClass(e.pct) + '">' + fmtPct(e.pct) + '</td>' +
      '<td style="color:#5a6278;max-width:140px;overflow:hidden;text-overflow:ellipsis;">' + (e.notes || '') + '</td>' +
    '</tr>';
  }
  body.innerHTML = html;
}

function showTab(name, btn) {
  var tabs = ['dash', 'history', 'export'];
  for (var i = 0; i < tabs.length; i++) {
    document.getElementById('tab-' + tabs[i]).style.display = 'none';
  }
  document.getElementById('tab-' + name).style.display = 'block';
  var allTabs = document.querySelectorAll('.tab');
  for (var j = 0; j < allTabs.length; j++) allTabs[j].classList.remove('active');
  btn.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'dash') renderDashboard();
}

function openLog() {
  document.getElementById('fDate').value = todayStr();
  document.getElementById('fAUM').value = '';
  document.getElementById('fNotes').value = '';
  document.getElementById('logModal').classList.add('open');
}

function closeLog() {
  document.getElementById('logModal').classList.remove('open');
}

function saveEntry() {
  var stratId = document.getElementById('fStrat').value;
  var date = document.getElementById('fDate').value;
  var aum = parseFloat(document.getElementById('fAUM').value);
  var notes = document.getElementById('fNotes').value;
  if (notes) notes = notes.replace(/^\s+|\s+$/g, '');
  if (!date) { alert('Please pick a date.'); return; }
  if (isNaN(aum) || aum <= 0) { alert('Please enter a valid AUM amount.'); return; }
  var prevEntries = [];
  var all = getEntries(stratId);
  for (var i = 0; i < all.length; i++) {
    if (all[i].date < date) prevEntries.push(all[i]);
  }
  var prevAUM = prevEntries.length > 0 ? prevEntries[prevEntries.length - 1].aum : aum;
  var pnl = aum - prevAUM;
  var pct = prevAUM > 0 ? (pnl / prevAUM) * 100 : 0;
  var filtered = [];
  for (var k = 0; k < entries.length; k++) {
    if (!(entries[k].strategy === stratId && entries[k].date === date)) {
      filtered.push(entries[k]);
    }
  }
  entries = filtered;
  entries.push({ strategy: stratId, date: date, aum: aum, prevAUM: prevAUM, pnl: pnl, pct: pct, notes: notes });
  save();
  closeLog();
  renderDashboard();
}

function exportCSV() {
  if (entries.length === 0) { alert('No data to export yet.'); return; }
  var headers = ['Date', 'Strategy', 'Previous AUM (USD)', 'Current AUM (USD)', 'Period P&L (USD)', 'Period Return %', 'WTD %', 'MTD %', 'YTD %', 'ITD %', 'Notes'];
  var rows = [headers];
  var sorted = entries.slice().sort(function(a, b) {
    if (a.strategy !== b.strategy) return a.strategy < b.strategy ? -1 : 1;
    return a.date < b.date ? -1 : 1;
  });
  for (var i = 0; i < sorted.length; i++) {
    var e = sorted[i];
    var s = STRATS[e.strategy];
    var wtd = periodReturn(e.strategy, weekStart(e.date), e.date);
    var mtd = periodReturn(e.strategy, monthStart(e.date), e.date);
    var ytd = periodReturn(e.strategy, yearStart(e.date), e.date);
    var firstDate = getEntries(e.strategy)[0].date;
    var itd = periodReturn(e.strategy, firstDate, e.date);
    rows.push([
      e.date, s.name,
      e.prevAUM.toFixed(2), e.aum.toFixed(2),
      e.pnl.toFixed(2), e.pct.toFixed(4),
      wtd !== null ? wtd.toFixed(4) : '',
      mtd !== null ? mtd.toFixed(4) : '',
      ytd !== null ? ytd.toFixed(4) : '',
      itd !== null ? itd.toFixed(4) : '',
      '"' + (e.notes || '').replace(/"/g, "'") + '"'
    ]);
  }
  var csv = '';
  for (var r = 0; r < rows.length; r++) csv += rows[r].join(',') + '\n';
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'wiz_' + todayStr() + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function resetData() {
  if (!confirm('Delete ALL entries? This cannot be undone.')) return;
  entries = [];
  save();
  renderDashboard();
  renderHistory();
  alert('All data cleared.');
}

renderDashboard();
</script>
</body>
</html>
